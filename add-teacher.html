<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Add Teacher</title>

<link rel="stylesheet"
href="admin.css">

</head>

<body>

<div class="admin-box">

<h1>Add Teacher</h1>

<div class="teacher-photo-box">

<img
id="teacherPhotoPreview"
src="teacher.png">

<input
type="file"
id="teacherPhoto"
accept="image/*">

</div>
  
<input
type="text"
id="teacherId"
placeholder="Teacher ID">

<input
type="text"
id="teacherName"
placeholder="Teacher Name">

<input
type="text"
id="teacherSubject"
placeholder="Subject">

<input
type="tel"
id="teacherPhone"
placeholder="Mobile Number">

<input
type="email"
id="teacherEmail"
placeholder="Email Address">

<input
type="text"
id="teacherQualification"
placeholder="Qualification">

<input
type="number"
id="teacherExperience"
placeholder="Experience (Years)">

<select id="teacherStatus">

<option value="Active">

Active

</option>

<option value="Inactive">

Inactive

</option>

</select>
  
<button onclick="addTeacher()">

Save Teacher

</button>

<br><br>

<button
onclick="window.location.href='teachers.html'">

Back

</button>

</div>

<script type="module"
src="admin.js"></script>

</body>

</html>
