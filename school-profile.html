<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>School Profile</title>

<link rel="stylesheet"
href="admin.css">

</head>

<body>

<div class="dashboard">

<h1>School Profile</h1>

<input
type="text"
id="schoolName"
placeholder="School Name">

<input
type="text"
id="principalName"
placeholder="Principal Name">

<input
type="text"
id="schoolAddress"
placeholder="School Address">

<input
type="text"
id="schoolPhone"
placeholder="Phone Number">

<input
type="email"
id="schoolEmail"
placeholder="Email Address">

<input
type="text"
id="schoolWebsite"
placeholder="Website">

  <input
type="file"
id="schoolLogo"
accept="image/*">

<img
id="logoPreview"
width="120"
style="display:block;margin:20px auto;border-radius:12px;">

<button onclick="saveSchoolProfile()">

Save Profile

</button>

<br><br>

<button
onclick="location.href='dashboard.html'">

Back

</button>

</div>

<script type="module"
src="admin.js"></script>

</body>

</html>
