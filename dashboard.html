<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link rel="stylesheet"
href="admin.css">

</head>

<body>

    <img
id="schoolLogoImage"
class="school-logo.png">

<div class="dashboard">
<div class="dashboard-layout">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="sidebar-logo">
            <h2>MIS</h2>
        </div>

        <nav class="sidebar-menu">
            <button>🏠</button>
            <button>👨‍🎓</button>
            <button>👨‍🏫</button>
            <button>📊</button>
            <button>⚙️</button>
        </nav>

    </aside>

    <!-- Main Content -->
    <div class="dashboard-content">

        <header class="dashboard-header">

            <div class="welcome-box">
                <h2 id="schoolTitle">
                    Modern International School
                </h2>

                <p>
                    Welcome Back, Administrator
                </p>
            </div>

            <div id="dashboardClock"
                 class="dashboard-time">
            </div>

        </header>
    <div class="dashboard-stats">

    <div class="stat-card">
       <h2 id="studentCount">0</h2>
       <span>Total Students</span>
    </div>

    <div class="stat-card">
        <h2 id="teacherCount">0</h2>
        <span>Teachers</span>
    </div>

    <div class="stat-card">
        <h2 id="classCount">6</h2>
        <span>Classes</span>
    </div>

    <div class="stat-card">
        <h2 id="resultCount">0</h2>
        <span>Published Results</span>
    </div>

    </div>

<div class="menu">
    
<button onclick="window.location.href='students.html'">
Student Records
</button>

<button onclick="window.location.href='add-student.html'">
➕ Add Student
</button>

    <button
onclick="window.location.href='teachers.html'">

Teacher Management

    </button>
    
<button id="marksBtn">
Marks Management
</button>

<button id="resultBtn">
Publish Result
</button>

<button onclick="window.location.href='change-password.html'">

Change Password

</button>

    <button
onclick="location.href='school-profile.html'">

🏫 School Profile

    </button>
  
  <button onclick="adminLogout()">
    Logout
  </button>

</div>
    
</div>
<script type="module" src="admin.js"></script>

    <footer class="dashboard-footer">
School Management Portal
<br>
© 2026 All Rights Reserved
    </footer>

</body>

</html>
