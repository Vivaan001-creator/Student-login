<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern International School - Teacher Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&amp;display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Background Decorative Elements -->
        <div class="bg-circle circle1"></div>
        <div class="bg-circle circle2"></div>
        <div class="bg-dots dots1"></div>
        <div class="bg-dots dots2"></div>

        <!-- Header Illustration -->
        <div class="illustration">
            <svg width="280" height="180" viewBox="0 0 280 180" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Clouds -->
                <ellipse cx="60" cy="35" rx="18" ry="12" fill="#E0E7FF"/>
                <ellipse cx="220" cy="45" rx="22" ry="14" fill="#E0E7FF"/>
                
                <!-- Trees -->
                <path d="M35 95 Q25 75 45 75 Q35 55 55 65 Z" fill="#A5B4FC"/>
                <path d="M245 95 Q235 75 255 75 Q245 55 265 65 Z" fill="#A5B4FC"/>
                
                <!-- School Building -->
                <rect x="95" y="55" width="90" height="70" rx="8" fill="#6366F1"/>
                <!-- Roof -->
                <polygon points="85,55 140,35 195,55" fill="#4F46E5"/>
                <!-- Flag -->
                <line x1="140" y1="35" x2="140" y2="25" stroke="#1E2937" stroke-width="4"/>
                <polygon points="140,25 155,30 140,35" fill="#EF4444"/>
                
                <!-- Windows -->
                <rect x="105" y="65" width="12" height="12" fill="#E0E7FF"/>
                <rect x="125" y="65" width="12" height="12" fill="#E0E7FF"/>
                <rect x="155" y="65" width="12" height="12" fill="#E0E7FF"/>
                <rect x="175" y="65" width="12" height="12" fill="#E0E7FF"/>
                
                <!-- Door -->
                <rect x="135" y="90" width="18" height="35" fill="#1E2937"/>
                <circle cx="147" cy="107" r="2" fill="#E0E7FF"/>
                
                <!-- Clock -->
                <circle cx="140" cy="48" r="8" fill="#E0E7FF"/>
                <line x1="140" y1="48" x2="140" y2="42" stroke="#1E2937" stroke-width="2"/>
                <line x1="140" y1="48" x2="145" y2="50" stroke="#1E2937" stroke-width="2"/>
            </svg>
        </div>

        <h1 class="school-title">Modern International School</h1>
        <div class="login-subtitle">
            <span class="line"></span>
            Teacher Login
            <span class="line"></span>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <div class="avatar">
                <svg width="70" height="70" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="35" cy="35" r="35" fill="#E0E7FF"/>
                    <path d="M35 42C28 42 23 47 23 54H47C47 47 42 42 35 42Z" fill="#6366F1"/>
                    <circle cx="35" cy="28" r="10" fill="#6366F1"/>
                </svg>
            </div>

            <h2 class="welcome">Welcome Back!</h2>
            <p class="subtitle-text">Login to your account to continue</p>

            <form id="loginForm">
                <div class="input-group">
                    <label>Username / Email</label>
                    <div class="input-wrapper">
                        <span class="icon">👤</span>
                        <input type="text" placeholder="Enter your username or email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper password-wrapper">
                        <span class="icon">🔒</span>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password">👁️</button>
                    </div>
                </div>

                <div class="options">
                    <label class="remember">
                        <input type="checkbox">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">
                    <span class="btn-icon">👤</span>
                    Login
                </button>
            </form>

            <div class="secure">
                <span class="shield">🛡️</span>
                Secure Login
            </div>
        </div>
    </div>

    <script>
        // Password toggle
        const toggleBtn = document.querySelector('.toggle-password');
        const passwordInput = document.getElementById('password');
        
        toggleBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        });

        // Form submission animation
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = form.querySelector('.login-btn');
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btn.style.transform = 'scale(1)';
                alert('Login successful! (Demo)');
            }, 200);
        });
    </script>
</body>
</html>
