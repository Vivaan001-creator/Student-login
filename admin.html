<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern International School - Teacher Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- Decorative background elements -->
<div class="bg-blob-top-left"></div>
<div class="bg-dots bg-dots-top-right"></div>
<div class="bg-dots bg-dots-bottom-left"></div>
<div class="bg-ring bg-ring-mid-right"></div>
<div class="bg-dot bg-dot-mid-left"></div>
<div class="bg-arc bg-arc-bottom-right"></div>

<div class="page">

  <!-- School illustration -->
  <div class="illustration-wrap">
    <svg class="school-illustration" viewBox="0 0 400 260" aria-hidden="true">

      <!-- ground shadow -->
      <ellipse cx="200" cy="248" rx="180" ry="8" fill="#e7e4fb"/>

      <!-- birds -->
      <path class="bird bird-1" d="M60,55 q6,-8 12,0 q6,-8 12,0" fill="none" stroke="#3a3a5c" stroke-width="2.5" stroke-linecap="round"/>
      <path class="bird bird-2" d="M100,35 q5,-7 10,0 q5,-7 10,0" fill="none" stroke="#3a3a5c" stroke-width="2.2" stroke-linecap="round"/>

      <!-- clouds -->
      <g class="cloud cloud-1" fill="#d9d6f7">
        <ellipse cx="70" cy="80" rx="26" ry="14"/>
        <ellipse cx="92" cy="74" rx="18" ry="12"/>
        <ellipse cx="52" cy="76" rx="16" ry="10"/>
      </g>
      <g class="cloud cloud-2" fill="#d9d6f7">
        <ellipse cx="320" cy="70" rx="24" ry="13"/>
        <ellipse cx="340" cy="65" rx="16" ry="11"/>
        <ellipse cx="302" cy="67" rx="14" ry="9"/>
      </g>

      <!-- left fluffy tree -->
      <g class="tree tree-1">
        <rect x="87" y="196" width="8" height="42" fill="#8b86e0"/>
        <ellipse cx="91" cy="160" rx="23" ry="21" fill="#c3bff5"/>
        <ellipse cx="65" cy="178" rx="21" ry="23" fill="#a8a3ec"/>
        <ellipse cx="118" cy="178" rx="21" ry="23" fill="#a8a3ec"/>
        <ellipse cx="91" cy="184" rx="32" ry="24" fill="#b6b1f0"/>
      </g>

      <!-- right fluffy tree -->
      <g class="tree tree-2">
        <rect x="305" y="196" width="8" height="42" fill="#8b86e0"/>
        <ellipse cx="309" cy="160" rx="23" ry="21" fill="#c3bff5"/>
        <ellipse cx="283" cy="178" rx="21" ry="23" fill="#a8a3ec"/>
        <ellipse cx="336" cy="178" rx="21" ry="23" fill="#a8a3ec"/>
        <ellipse cx="309" cy="184" rx="32" ry="24" fill="#b6b1f0"/>
      </g>

      <!-- small bushes -->
      <g fill="#c7c3f5">
        <circle cx="132" cy="224" r="11"/>
        <circle cx="150" cy="228" r="7"/>
        <circle cx="252" cy="224" r="11"/>
        <circle cx="270" cy="228" r="7"/>
      </g>

      <!-- flag pole rising from roof apex -->
      <rect x="198.5" y="76" width="3" height="40" fill="#4b3fd6"/>
      <path class="flag" d="M201.5,76 L226,84 L201.5,92 Z" fill="#5b52e5"/>

      <!-- main pitched roof -->
      <polygon points="200,114 132,166 268,166" fill="#241f4d"/>
      <rect x="128" y="162" width="144" height="7" rx="2" fill="#241f4d"/>

      <!-- building body -->
      <rect x="150" y="150" width="100" height="80" rx="4" fill="url(#buildingGrad)"/>

      <!-- clock circle at roof/wall junction -->
      <circle cx="200" cy="150" r="16" fill="#ffffff"/>
      <line x1="200" y1="150" x2="200" y2="140" stroke="#5b52e5" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="200" y1="150" x2="208" y2="150" stroke="#5b52e5" stroke-width="2.4" stroke-linecap="round"/>

      <!-- windows left -->
      <g fill="#ffffff" opacity="0.95">
        <rect x="161" y="172" width="13" height="13" rx="1.5"/>
        <rect x="178" y="172" width="13" height="13" rx="1.5"/>
      </g>

      <!-- windows right -->
      <g fill="#ffffff" opacity="0.95">
        <rect x="209" y="172" width="13" height="13" rx="1.5"/>
        <rect x="226" y="172" width="13" height="13" rx="1.5"/>
      </g>

      <!-- door -->
      <path d="M188,230 L188,204 Q188,192 200,192 Q212,192 212,204 L212,230 Z" fill="#ede9ff"/>

      <defs>
        <linearGradient id="buildingGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6b62ee"/>
          <stop offset="100%" stop-color="#4f45d8"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <!-- Title -->
  <h1 class="school-title">
    Modern International<br>
    <span>School</span>
  </h1>

  <div class="subtitle-divider">
    <span class="line"></span>
    <span class="dot"></span>
    <span class="subtitle-text">Teacher Login</span>
    <span class="dot"></span>
    <span class="line"></span>
  </div>

  <!-- Login card -->
  <div class="login-card">

    <div class="avatar-circle">
      <div class="avatar-inner">
        <i class="fa-solid fa-user"></i>
      </div>
    </div>

    <h2 class="welcome-title">Welcome Back!</h2>
    <p class="welcome-subtitle">Login to your account to continue</p>

    <form id="loginForm" novalidate>

      <label class="field-label" for="username">Username / Email</label>
      <div class="input-wrap">
        <i class="fa-regular fa-user input-icon"></i>
        <input type="text" id="username" name="username" placeholder="Enter your username or email" autocomplete="username">
      </div>

      <label class="field-label" for="password">Password</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock input-icon"></i>
        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
        <button type="button" class="toggle-eye" id="toggleEye" aria-label="Toggle password visibility">
          <i class="fa-regular fa-eye-slash"></i>
        </button>
      </div>

      <div class="row-between">
        <label class="remember-me">
          <input type="checkbox" id="remember">
          <span class="checkbox-box"></span>
          Remember me
        </label>
        <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
      </div>

      <button type="submit" class="login-btn">
        <i class="fa-solid fa-user"></i>
        <span>Login</span>
      </button>
      <a href="dashboard.html" class="dashboard-link">submit</a>

      <div class="secure-login">
        <span class="line"></span>
        <i class="fa-solid fa-shield-halved"></i>
        <span>Secure Login</span>
        <span class="line"></span>
      </div>

    </form>
  </div>

</div>

<script type="module" src="admin.js"></script>
</body>
  </html>
