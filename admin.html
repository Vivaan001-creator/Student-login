<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login · Modern International School</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">

      <!-- Header -->
      <div class="school-header">
        <h1>Modern International School</h1>
        <p class="sub-title">Teacher Login</p>
      </div>

      <div class="divider"></div>

      <!-- Welcome -->
      <h2 class="welcome-text">Welcome Back!</h2>
      <p class="welcome-sub">Login to your account to continue</p>

      <!-- Form -->
      <form class="login-form">
        <div class="input-group">
          <label for="username">Username / Email</label>
          <input type="text" id="username" placeholder="Enter your username or email" />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" />
        </div>

        <div class="options-row">
          <label class="remember">
            <input type="checkbox" /> Remember me
          </label>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">Login</button>
        <p class="secure-text">🔒 Secure Login</p>
      </form>

    </div>
  </div>
</body>
</html>
