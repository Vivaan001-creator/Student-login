<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Teacher Attendance Report</title>

<link rel="stylesheet"
href="admin.css">

</head>

<body>

<div class="dashboard">

<h1>Teacher Monthly Report</h1>

<select id="reportTeacher"></select>

<input
type="month"
id="reportMonth">

<button
onclick="loadTeacherReport()">

Generate Report

</button>

<div class="preview-box">

<p>Total Days :
<span id="totalDays">0</span></p>

<p>Present :
<span id="presentDays">0</span></p>

<p>Absent :
<span id="absentDays">0</span></p>

<p>Leave :
<span id="leaveDays">0</span></p>

<p>Attendance :
<span id="attendancePercent">0%</span></p>

  <div class="attendance-progress">

<div class="attendance-status">

<div class="status-card present-card">
<h3>Present</h3>
<p id="presentCard">0</p>
</div>

<div class="status-card absent-card">
<h3>Absent</h3>
<p id="absentCard">0</p>
</div>

<div class="status-card leave-card">
<h3>Leave</h3>
<p id="leaveCard">0</p>
</div>

</div>

<div class="performance-box">

<h2 id="performanceTitle">

Excellent

</h2>

<p id="performanceMessage">

Teacher Performance

</p>

</div>
    
<div class="progress-circle">

<span id="attendancePercentCircle">

0%

</span>

</div>

</div>

<br>

<button onclick="window.print()">

Print Report

</button>

</div>

</div>

<script
type="module"
src="admin.js"></script>

</body>

</html>
